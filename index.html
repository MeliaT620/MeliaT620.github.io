<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mengyun Liu</title>
    <meta
      name="description"
      content="Personal website of Mengyun Liu."
    >
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2288%22>☁️</text></svg>"
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5ef;
        --text: #1d2430;
        --muted: #5c6675;
        --line: #d8d1c2;
        --accent: #286b5f;
        --accent-strong: #174d44;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(40, 107, 95, 0.16), transparent 34rem),
          linear-gradient(135deg, #f7f5ef 0%, #eef3ef 100%);
      }

      main {
        width: min(100% - 2rem, 960px);
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 4rem 0;
      }

      .intro {
        width: 100%;
        display: grid;
        gap: 2rem;
        align-items: end;
      }

      .mark {
        width: 4rem;
        height: 4rem;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.62);
        color: var(--accent);
        font-size: 1.1rem;
        font-weight: 700;
      }

      h1 {
        max-width: 14ch;
        margin: 0;
        font-size: clamp(3.4rem, 11vw, 8.2rem);
        line-height: 0.88;
        font-weight: 750;
        letter-spacing: 0;
      }

      p {
        max-width: 34rem;
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 2.875rem;
        padding: 0 1.1rem;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: var(--surface);
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 650;
        text-decoration: none;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      .button:hover {
        border-color: var(--accent-strong);
      }

      @media (min-width: 760px) {
        .intro {
          grid-template-columns: 1fr 0.62fr;
        }

        .copy {
          padding-bottom: 0.45rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="intro" aria-label="Personal introduction">
        <div>
          <div class="mark" aria-hidden="true">☁️</div>
          <h1>Mengyun Liu</h1>
        </div>
        <div class="copy">
          <p>
            A personal website is coming together here. For now, this page is
            live so the domain, GitHub Pages, and HTTPS setup can be verified.
          </p>
          <div class="actions" aria-label="Links">
            <a class="button primary" href="mailto:liumy.melia@gmail.com">Email</a>
            <a class="button" href="https://liumengyun.me">liumengyun.me</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
